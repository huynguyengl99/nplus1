[tox]
env_list =
    py{311,312,313}-django{42,51,52}
    py{311,312,313}-sqlalchemy
    py{311,312,313}-peewee
    py{311,312,313}-flask
    py{311,312,313}-core
    lint
    coverage
isolated_build = True

[gh]
python =
    3.11 = py311-django{42,51,52}, py311-sqlalchemy, py311-peewee, py311-flask, py311-core
    3.12 = py312-django{42,51,52}, py312-sqlalchemy, py312-peewee, py312-flask, py312-core
    3.13 = py313-django{42,51,52}, py313-sqlalchemy, py313-peewee, py313-flask, py313-core

[testenv]
pass_env =
    DJANGO_*
    POSTGRES_*
allowlist_externals =
    pytest
    py
    python
    scripts/lint.sh
    scripts/mypy.sh
runner = uv-venv-runner
setenv =
    PYTHONPATH = {toxinidir}

[testenv:py{311,312,313}-django{42,51,52}]
deps =
    django42: Django>=4.2,<4.3
    django51: Django>=5.1,<5.2
    django52: Django>=5.2,<5.3
dependency_groups = test-django
commands =
    pytest tests/testapp tests/test_core.py {posargs}

[testenv:py{311,312,313}-sqlalchemy]
dependency_groups = test-sqlalchemy
commands =
    pytest tests/test_sqlalchemy.py tests/test_core.py {posargs}

[testenv:py{311,312,313}-peewee]
dependency_groups = test-peewee
commands =
    pytest tests/test_peewee.py tests/test_core.py {posargs}

[testenv:py{311,312,313}-flask]
dependency_groups = test-flask
commands =
    pytest tests/test_flask_sqlalchemy.py tests/test_wsgi.py tests/test_core.py {posargs}

[testenv:py{311,312,313}-core]
dependency_groups = test
commands =
    pytest tests/test_core.py {posargs}

[testenv:lint]
allowlist_externals =
    scripts/lint.sh
    scripts/mypy.sh
dependency_groups = dev, lint, test-all
commands =
    scripts/lint.sh
    scripts/mypy.sh
    pyright --venvpath {envdir}

[testenv:coverage]
dependency_groups = test-all
commands =
    pytest --cov-report term-missing --cov-report=xml --cov=nplusone tests {posargs}

[pytest]
filterwarnings =
    ignore::DeprecationWarning

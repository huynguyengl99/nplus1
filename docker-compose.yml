services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nplusone_test
      POSTGRES_USER: nplusone
      POSTGRES_PASSWORD: nplusone
    ports:
      - "5451:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nplusone -d nplusone_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
